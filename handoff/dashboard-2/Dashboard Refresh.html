<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard refresh — 2 variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, sans-serif; background: #eaeaea; color: #111; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input::placeholder { color: inherit; opacity: 0.55; }
  /* Hide scrollbars in nested overflow areas — keep dashboard clean */
  main > div::-webkit-scrollbar { width: 8px; height: 8px; }
  main > div::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 999px; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dashboard-components.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2D63E8",
  "sidebarStyle": "comfortable"
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = [
  "#2D63E8",            // signal blue (default)
  "#0F766E",            // teal-jade
  "#B45309",            // amber-clay
  "#7C3AED",            // violet
  "#0F1115",            // ink
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas title="Dashboard refresh" subtitle="2 variations · header, sidebar, cards, charts">
        <DCSection id="dashboards" title="Dashboards">
          <DCArtboard id="warm-editorial" label="A — Warm editorial · cream + soft pills" width={1440} height={900}>
            <DashboardA accent={t.accent} sidebarStyle={t.sidebarStyle} />
          </DCArtboard>
          <DCArtboard id="cool-compact" label="B — Compact · warm cream palette" width={1440} height={900}>
            <DashboardB accent={t.accent} sidebarStyle={t.sidebarStyle} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent color">
          <TweakColor
            label="Accent"
            value={t.accent}
            options={ACCENT_OPTIONS}
            onChange={(v) => setTweak("accent", v)}
          />
        </TweakSection>
        <TweakSection label="Sidebar style">
          <TweakRadio
            label="Style"
            value={t.sidebarStyle}
            options={["comfortable", "minimal", "dark-rail"]}
            onChange={(v) => setTweak("sidebarStyle", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
